<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台球计分小程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #78350f 0%, #92400e 50%, #78350f 100%);
            padding: 16px;
        }
        .container {
            background-color: rgba(22, 101, 52, 0.95);
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 16px;
        }
        .content {
            color: #fef3c7;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .success {
            background-color: rgba(21, 128, 61, 0.6);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .success p {
            color: #d9f99d;
            font-size: 14px;
        }
        .info {
            color: #fde68a;
            font-size: 14px;
            line-height: 1.8;
        }
        .highlight {
            color: #fbbf24;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎱</div>
        <h1>台球计分小程序</h1>
        <div class="content">
            <p>欢迎使用台球计分小程序！</p>
        </div>
        <div class="success">
            <p>✅ 部署成功！</p>
            <p style="margin-top: 8px; font-size: 12px;">如果你能看到这个页面，说明应用工作正常！</p>
        </div>
        <div class="info">
            <p>访问地址：<span class="highlight">https://cloudcool2025.github.io/bobo.github.io</span></p>
        </div>
    </div>
</body>
</html>
